<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BloodConnect — Find Blood Donors Near You</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="BloodConnect — India's largest blood donor network. Find verified blood donors by blood group, city and state. Register as a donor and save lives."
    />
    <meta name="theme-color" content="#C1121F" />

    <!-- Open Graph -->
    <meta property="og:title" content="BloodConnect — Find Blood Donors" />
    <meta
      property="og:description"
      content="Connect with blood donors in your city. Real-time search, instant requests. Save a life today."
    />
    <meta property="og:type" content="website" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!-- Preconnect for Google Fonts (loaded in styles.scss) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <app-root></app-root>

    <!-- No-JS fallback -->
    <noscript>
      <div
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          font-family: sans-serif;
          text-align: center;
          padding: 20px;
        "
      >
        <div>
          <div style="font-size: 3rem; margin-bottom: 16px">🩸</div>
          <h2>JavaScript Required</h2>
          <p>BloodConnect requires JavaScript to run. Please enable it in your browser.</p>
        </div>
      </div>
    </noscript>
  </body>
</html>
